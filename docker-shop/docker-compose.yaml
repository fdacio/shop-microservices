name: shop
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5435:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: shop
    healthcheck:
#      test: [ "CMD", "psql", "--username=postgres",  "--command=SELECT 1 FROM pg_database WHERE datname='shop';"]
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d shop"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:4.2.0
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      # 🔥 ESSENCIAL PARA AMBIENTE LOCAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - ./kafka/data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "unset JMX_PORT; /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  auth:
    image: daciosoftware/shop-auth-api:latest
    ports:
      - "8881:8081"
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/shop
      POSTGRES_USERNAME: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CUSTOMER_API_URL: http://customer:8083
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://auth:8081/auth/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s

  product:
    image: daciosoftware/shop-product-api:latest
    ports:
      - "8882:8082"
    volumes:
      - ./produtos/photos:/app/photos
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/shop
      POSTGRES_USERNAME: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://product:8082/product/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s

  customer:
    image: daciosoftware/shop-customer-api:latest
    ports:
      - "8883:8083"
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/shop
      POSTGRES_USERNAME: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PRODUCT_API_URL: http://product:8082
      AUTH_API_URL: http://auth:8081
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://customer:8083/customer/health" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 180s

  order:
    image: daciosoftware/shop-order-api:latest
    ports:
      - "8884:8084"
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/shop
      POSTGRES_USERNAME: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AUTH_API_URL: http://auth:8081
      PRODUCT_API_URL: http://product:8082
      CUSTOMER_API_URL: http://customer:8083
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BROKER_CARDCARD_URL: https://brokercredcard.daciosoftware.com.br/api
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth:
        condition: service_healthy
      product:
        condition: service_healthy
      customer:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://order:8084/order/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s

  gateway:
    image: daciosoftware/shop-gateway-api:latest
    ports:
      - "8880:8080"
    environment:
      AUTH_API_URL: http://auth:8081
      PRODUCT_API_URL: http://product:8082
      CUSTOMER_API_URL: http://customer:8083
      ORDER_API_URL: http://order:8084
    depends_on:
      auth:
        condition: service_healthy
      product:
        condition: service_healthy
      customer:
        condition: service_healthy
      order:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://gateway:8080/gateway/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
